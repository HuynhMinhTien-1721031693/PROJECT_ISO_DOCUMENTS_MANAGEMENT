name: Build and test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore (core projects, no Maui)
        run: dotnet restore IsoDocumentManagement.CI.slnf

      - name: Build
        run: dotnet build IsoDocumentManagement.CI.slnf -c Release --no-restore

      - name: Test
        run: dotnet test IsoDocumentManagement.CI.slnf -c Release --no-build --verbosity normal
